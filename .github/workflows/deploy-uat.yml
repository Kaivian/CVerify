name: UAT Deployment Pipeline

on:
  push:
    branches:
      - cverify-uat

permissions:
  contents: read
  id-token: write # Required for GCP Workload Identity Federation (OIDC)

# Optimize build costs by canceling running UAT pipelines when new updates arrive
concurrency:
  group: deploy-uat
  cancel-in-progress: true

jobs:
  # ============================================================================
  # 1. VALIDATION QUALITY GATE
  # ============================================================================
  validate:
    name: Validation Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js v20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Restore Frontend Dependencies
        run: npm ci --legacy-peer-deps
        working-directory: client

      - name: Run ESLint
        run: npm run lint
        working-directory: client

      - name: Verify Frontend Compilation
        run: npm run build
        working-directory: client

      - name: Setup .NET SDK 10.0
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'
          cache: false

      - name: Restore NuGet Packages
        run: dotnet restore CVerify.Core/CVerify.sln

      - name: Verify Code Formatting
        run: dotnet format CVerify.Core/CVerify.sln --verify-no-changes

      - name: Compile Backend Solution
        run: dotnet build CVerify.Core/CVerify.sln --configuration Release --no-restore

      - name: Execute Backend Unit Tests
        run: dotnet test CVerify.Core/tests/CVerify.API.UnitTests/CVerify.API.UnitTests.csproj --configuration Release --no-build

      - name: Execute Backend Integration Tests (Testcontainers)
        run: dotnet test CVerify.Core/tests/CVerify.API.IntegrationTests/CVerify.API.IntegrationTests.csproj --configuration Release --no-build

      - name: Setup Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'CVerify.AI/requirements.txt'

      - name: Install AI System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-eng poppler-utils

      - name: Install AI Pip Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r CVerify.AI/requirements.txt pytest pytest-cov pytest-asyncio

      - name: Run AI Pytest Suite
        run: pytest CVerify.AI/tests
        env:
          PYTHONPATH: CVerify.AI
          ANTHROPIC_API_KEY: dummy-key-for-ci
          SHARED_SECRET: dummy-secret-for-ci
          BACKEND_API_URL: http://mock-backend:8080

  # ============================================================================
  # 2. BUILD AND PUBLISH IMAGES
  # ============================================================================
  build-and-push:
    name: Build & Publish UAT Images
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@6fc7243db563d115aa309005de2d3700b2c1ec51 # v2.1.8
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e30db143798ac5a8286b71faf9d5293240d5885a # v2.1.1

      - name: Configure Docker to use GAR
        run: |
          gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      # --- A. Backend Service Image ---
      - name: Build and Push Core
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: ./CVerify.Core
          file: ./CVerify.Core/Dockerfile
          push: true
          tags: |
            asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cverify/core:sha-${{ github.sha }}
            asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cverify/core:uat
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- B. AI FastAPI Service Image ---
      - name: Build and Push AI
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: ./CVerify.AI
          file: ./CVerify.AI/Dockerfile
          push: true
          tags: |
            asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cverify/ai:sha-${{ github.sha }}
            asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cverify/ai:uat
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- C. Next.js Frontend Image ---
      - name: Build and Push Client
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.UAT_API_URL }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.UAT_GOOGLE_CLIENT_ID }}
          tags: |
            asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cverify/client:sha-${{ github.sha }}
            asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cverify/client:uat
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- D. Security Container Scan ---
      - name: Run Trivy Security Scan (Core)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cverify/core:sha-${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # ============================================================================
  # 3. ZERO-TOUCH VM DEPLOYMENT (UAT)
  # ============================================================================
  deploy:
    name: Trigger Zero-Touch VM Deploy (UAT)
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: cverify-uat # Standard UAT environment
    steps:
      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@6fc7243db563d115aa309005de2d3700b2c1ec51 # v2.1.8
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e30db143798ac5a8286b71faf9d5293240d5885a # v2.1.1

      - name: Execute Deployment over Secure IAP Tunnel
        run: |
          gcloud compute ssh cverify-prod-vm \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --zone=asia-southeast1-a \
            --tunnel-through-iap \
            --command="cd /app/cverify && git fetch origin && git checkout cverify-uat && git pull origin cverify-uat && ./scripts/deploy-gcp.sh Staging ${{ github.sha }}"
