name: Production Deployment Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  promote-and-deploy:
    name: Promote UAT Images & Deploy
    runs-on: ubuntu-latest
    environment: cverify-production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve UAT Source Git SHA
        id: resolve-sha
        run: |
          COMMIT_SHA="${{ github.sha }}"
          
          # Find the merged pull request and resolve its head SHA (UAT commit)
          PR_HEAD_SHA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${COMMIT_SHA}/pulls" \
            | jq -r '.[] | select(.merged_at != null) | .head.sha' | head -n 1)
          
          if [ -z "$PR_HEAD_SHA" ] || [ "$PR_HEAD_SHA" = "null" ]; then
            # Try getting the second parent of the merge commit
            PR_HEAD_SHA=$(git rev-parse HEAD^2 2>/dev/null || echo "")
          fi
          
          if [ -z "$PR_HEAD_SHA" ]; then
            # Fallback to the commit SHA itself (for fast-forward merges or direct pushes)
            PR_HEAD_SHA=$COMMIT_SHA
          fi
          
          echo "UAT_SHA=$PR_HEAD_SHA" >> $GITHUB_OUTPUT
          echo "Resolved validated UAT SHA: $PR_HEAD_SHA"

      - name: Download Validated Manifest from GCS
        id: download-manifest
        run: |
          UAT_SHA="${{ steps.resolve-sha.outputs.UAT_SHA }}"
          GCP_PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          
          # Pull build manifest containing exact digests
          gcloud storage cp "gs://cverify-build-metadata-${GCP_PROJECT}/manifests/sha-${UAT_SHA}.json" manifest.json
          
          # Extract service digests from JSON
          CORE_DIGEST=$(jq -r '.services.core' manifest.json)
          AI_DIGEST=$(jq -r '.services.ai' manifest.json)
          CLIENT_DIGEST=$(jq -r '.services.client' manifest.json)
          
          echo "CORE_DIGEST=$CORE_DIGEST" >> $GITHUB_OUTPUT
          echo "AI_DIGEST=$AI_DIGEST" >> $GITHUB_OUTPUT
          echo "CLIENT_DIGEST=$CLIENT_DIGEST" >> $GITHUB_OUTPUT

      - name: Promote and Tag Manifest Digests in GAR
        run: |
          PROD_SHA="${{ github.sha }}"
          GCP_PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          
          CORE_DIGEST="${{ steps.download-manifest.outputs.CORE_DIGEST }}"
          AI_DIGEST="${{ steps.download-manifest.outputs.AI_DIGEST }}"
          CLIENT_DIGEST="${{ steps.download-manifest.outputs.CLIENT_DIGEST }}"
          
          # Tag matching digests with production SHA, latest, and backup previous
          for svc in core ai client; do
            DIGEST_VAL=""
            if [ "$svc" = "core" ]; then DIGEST_VAL="$CORE_DIGEST"; fi
            if [ "$svc" = "ai" ]; then DIGEST_VAL="$AI_DIGEST"; fi
            if [ "$svc" = "client" ]; then DIGEST_VAL="$CLIENT_DIGEST"; fi
            
            # Backup current production tag to previous
            gcloud container images add-tag \
              "asia-southeast1-docker.pkg.dev/$GCP_PROJECT/cverify/$svc:latest" \
              "asia-southeast1-docker.pkg.dev/$GCP_PROJECT/cverify/$svc:previous" \
              --quiet || true
              
            # Add new production tag and latest tag directly to the validated digest
            gcloud container images add-tag \
              "$DIGEST_VAL" \
              "asia-southeast1-docker.pkg.dev/$GCP_PROJECT/cverify/$svc:sha-$PROD_SHA" \
              --quiet
              
            gcloud container images add-tag \
              "$DIGEST_VAL" \
              "asia-southeast1-docker.pkg.dev/$GCP_PROJECT/cverify/$svc:latest" \
              --quiet
          done
          
          # Promote manifest and orchestration bundle in GCS
          UAT_SHA="${{ steps.resolve-sha.outputs.UAT_SHA }}"
          gcloud storage cp \
            "gs://cverify-build-metadata-$GCP_PROJECT/manifests/sha-${UAT_SHA}.json" \
            "gs://cverify-build-metadata-$GCP_PROJECT/manifests/sha-${PROD_SHA}.json"
          
          gcloud storage cp \
            "gs://cverify-build-metadata-$GCP_PROJECT/deployments/sha-${UAT_SHA}.tar.gz" \
            "gs://cverify-build-metadata-$GCP_PROJECT/deployments/sha-${PROD_SHA}.tar.gz"
          echo "Manifest and orchestration bundle successfully promoted in GCS."

      - name: Ensure VM Bootstrap Complete
        run: |
          gcloud compute ssh ubuntu@cverify-prod-vm \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --zone=asia-southeast1-a \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag="-o ServerAliveInterval=15" \
            --ssh-flag="-o ServerAliveCountMax=60" \
            --command="
              set -e

              # If bootstrap already completed, skip
              if [ -f /var/log/cverify-bootstrap-done ]; then
                echo '[Bootstrap] Already completed.'
                exit 0
              fi

              echo '=== Bootstrap not complete. Running diagnostics... ==='

              # Show bootstrap log if exists (startup script output)
              if [ -f /var/log/cverify-bootstrap.log ]; then
                echo '--- Startup script log ---'
                sudo cat /var/log/cverify-bootstrap.log 2>/dev/null || true
              fi

              # Network diagnostics
              echo '--- Network diagnostics ---'
              echo 'IP config:' && ip addr show 2>/dev/null | grep inet || true
              echo 'Default route:' && ip route show default 2>/dev/null || true
              echo 'DNS config:' && cat /etc/resolv.conf 2>/dev/null || true
              echo 'DNS test:' && nslookup archive.ubuntu.com 2>&1 || true
              echo 'Curl test:' && curl -svI --max-time 5 https://archive.ubuntu.com 2>&1 | head -20 || true
              echo 'Metadata test:' && curl -sf --max-time 3 -H 'Metadata-Flavor: Google' http://metadata.google.internal/computeMetadata/v1/instance/zone 2>&1 || true

              # Check apt state
              echo '--- Apt diagnostics ---'
              echo 'Apt sources:' && cat /etc/apt/sources.list 2>/dev/null || true
              echo 'Lock holders:' && sudo fuser /var/lib/dpkg/lock /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock 2>&1 || echo 'No locks held'

              # Attempt inline bootstrap with full output
              echo '=== Attempting inline bootstrap... ==='

              # Clean up malformed apt sources from failed startup script
              # The startup script may have written literal $(lsb_release -cs) instead of jammy
              if grep -q 'lsb_release' /etc/apt/sources.list.d/docker.list 2>/dev/null; then
                echo 'Removing malformed docker.list...'
                sudo rm -f /etc/apt/sources.list.d/docker.list
              fi

              # Stop apt-daily to prevent lock contention
              sudo systemctl stop apt-daily.timer apt-daily-upgrade.timer 2>/dev/null || true
              sudo systemctl stop apt-daily.service apt-daily-upgrade.service 2>/dev/null || true
              sudo systemctl kill --kill-whom=all apt-daily.service 2>/dev/null || true

              # Wait for cloud-init
              if command -v cloud-init &>/dev/null; then
                echo 'Waiting for cloud-init...'
                sudo cloud-init status --wait 2>/dev/null || true
              fi

              # Try apt-get update with full error output
              echo 'Running apt-get update...'
              sudo apt-get update 2>&1 || {
                echo 'apt-get update failed. Trying with fix-broken...'
                sudo dpkg --configure -a 2>&1 || true
                sudo apt-get update --fix-missing 2>&1
              }

              # Install required packages
              echo 'Installing base packages...'
              sudo apt-get install -y apt-transport-https ca-certificates curl gnupg lsb-release jq git 2>&1

              # Docker
              if ! command -v docker &>/dev/null; then
                echo 'Installing Docker...'
                sudo mkdir -p /etc/apt/keyrings
                curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --yes --dearmor -o /etc/apt/keyrings/docker.gpg
                CODENAME=\$(lsb_release -cs)
                echo \"deb [arch=\$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \$CODENAME stable\" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
                echo \"Docker source configured for: \$CODENAME\"
                sudo apt-get update 2>&1
                sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin 2>&1
              else
                echo 'Docker already installed.'
              fi

              # gcloud
              if ! command -v gcloud &>/dev/null; then
                echo 'Installing Google Cloud CLI...'
                echo 'deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main' | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list
                curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloud.google.gpg
                sudo apt-get update 2>&1
                sudo apt-get install -y google-cloud-cli 2>&1
              else
                echo 'gcloud already installed.'
              fi

              # Post-install config
              sudo mkdir -p /app/cverify
              sudo chown -R ubuntu:ubuntu /app/cverify
              sudo usermod -aG docker ubuntu
              sudo mkdir -p /var/log/cverify
              sudo chown -R ubuntu:ubuntu /var/log/cverify

              # Re-enable apt-daily
              sudo systemctl start apt-daily.timer apt-daily-upgrade.timer 2>/dev/null || true

              # Mark bootstrap complete
              echo 'done' | sudo tee /var/log/cverify-bootstrap-done
              echo '[Bootstrap] Inline bootstrap completed successfully.'
            "

      - name: Deploy Application
        run: |
          gcloud compute ssh ubuntu@cverify-prod-vm \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --zone=asia-southeast1-a \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag="-o ServerAliveInterval=15" \
            --ssh-flag="-o ServerAliveCountMax=60" \
            --command="
              # Download versioned orchestration package from GCS
              gcloud storage cp gs://cverify-build-metadata-${{ secrets.GCP_PROJECT_ID }}/deployments/sha-${{ github.sha }}.tar.gz /tmp/deployment.tar.gz
              
              # Extract package to app folder
              sudo mkdir -p /app/cverify
              sudo chown -R ubuntu:ubuntu /app/cverify
              tar -xzf /tmp/deployment.tar.gz -C /app/cverify
              
              # Ensure all scripts have execute permission
              find /app/cverify -name '*.sh' -exec chmod +x {} +
              
              # Execute deployer
              cd /app/cverify
              ./scripts/deploy-gcp.sh Production ${{ github.sha }}
            "
