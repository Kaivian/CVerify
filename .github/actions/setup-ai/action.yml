name: Setup AI Environment
description: Configures Python, installs OCR and PDF system libraries, and restores pip dependencies

runs:
  using: composite
  steps:
    - name: Setup Python 3.11
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'CVerify.AI/requirements.txt'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-eng tesseract-ocr-vie poppler-utils
      shell: bash

    - name: Install Pip Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r CVerify.AI/requirements.txt
        pip install pytest pytest-cov pytest-asyncio
      shell: bash
