services:
  postgres:
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5435:5432"

  redis:
    command: redis-server --requirepass "${REDIS_PASSWORD}" --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru

  cverify-ai:
    image: ${GAR_REGISTRY_URL}/${GCP_PROJECT_ID}/cverify/ai:${IMAGE_TAG:-latest}
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BACKEND_API_URL: http://cverify-core:5000
      HOST: 0.0.0.0
      PORT: 8000
      SHARED_SECRET: ${AI_SERVICE_SHARED_SECRET}
      CLIENT_ID: ${AI_SERVICE_CLIENT_ID}
      CLONE_DETECTION_ENABLED: ${CLONE_DETECTION_ENABLED:-true}
      AI_DEBUG_MODE: ${AI_DEBUG_MODE:-false}
      ENABLE_VISION_CERTIFICATE_OCR: ${ENABLE_VISION_CERTIFICATE_OCR:-false}

  cverify-core:
    image: ${GAR_REGISTRY_URL}/${GCP_PROJECT_ID}/cverify/core:${IMAGE_TAG:-latest}
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_SERVICE_URL: http://cverify-ai:8000
      PORT: 5000
      EmailSettings__Provider: ${EMAIL_PROVIDER:-Smtp}
    ports:
      - "127.0.0.1:${CORE_PORT:-5250}:5000"

  cverify-client:
    image: ${GAR_REGISTRY_URL}/${GCP_PROJECT_ID}/cverify/client:${IMAGE_TAG:-latest}
    env_file:
      - ../.env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5250/api}
      PORT: 3000
      JWT_SECRET: ${JWT_KEY}
    ports:
      - "${CLIENT_PORT:-3003}:3000"

networks:
  cverify-infra-net:
    name: cverify-infra_cverify-infra-net
    external: true

