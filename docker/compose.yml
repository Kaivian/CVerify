services:
  # ============================================================================
  # 1. DATABASE LAYER: PostgreSQL with pgvector extension
  # ============================================================================
  postgres:
    image: pgvector/pgvector:0.7.0-pg16
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cverify-infra-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          memory: 256M
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$DB_USER -d $$DB_NAME"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ============================================================================
  # 2. CACHING LAYER: Redis with password authentication and eviction policy
  # ============================================================================
  redis:
    image: redis:7.2.4-alpine3.19
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - cverify-infra-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 64M
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ============================================================================
  # 3. AI SERVICE LAYER: FastAPI Python Microservice (Tesseract OCR + Claude)
  # ============================================================================
  cverify-ai:
    build:
      context: ../CVerify.AI
      dockerfile: Dockerfile
    restart: always
    volumes:
      - cverify_workspaces:/app/temp_clones
    networks:
      - cverify-backend-net
      - cverify-infra-net
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2048M
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      redis:
        condition: service_healthy

  # ============================================================================
  # 4. SERVER LAYER: ASP.NET Core v10 Web API Gateway
  # ============================================================================
  cverify-core:
    build:
      context: ../CVerify.Core
      dockerfile: Dockerfile
    restart: always
    networks:
      - cverify-frontend-net
      - cverify-backend-net
      - cverify-infra-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      cverify-ai:
        condition: service_healthy

  # ============================================================================
  # 5. CLIENT PORTAL LAYER: Next.js Web App
  # ============================================================================
  cverify-client:
    build:
      context: ../client
      dockerfile: Dockerfile
    restart: always
    networks:
      - cverify-frontend-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1024M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      cverify-core:
        condition: service_healthy

# ==============================================================================
# NETWORK SEGMENTATION DESIGN
# ==============================================================================
networks:
  cverify-frontend-net:
    driver: bridge
  cverify-backend-net:
    driver: bridge
  cverify-infra-net:
    driver: bridge

# ==============================================================================
# NAMED VOLUMES DEFINITIONS
# ==============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  cverify_workspaces:
    driver: local
