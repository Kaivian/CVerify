services:
  postgres:
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:${DB_PORT:-5433}:5432"

  redis:
    command: redis-server --requirepass "${REDIS_PASSWORD}" --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"

  cverify-ai:
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BACKEND_API_URL: http://cverify-core:5000
      HOST: 0.0.0.0
      PORT: 8000
      SHARED_SECRET: ${AI_SERVICE_SHARED_SECRET}
      CLIENT_ID: ${AI_SERVICE_CLIENT_ID}
      CLONE_DETECTION_ENABLED: ${CLONE_DETECTION_ENABLED:-false}
      AI_DEBUG_MODE: ${AI_DEBUG_MODE:-false}
      ENABLE_VISION_CERTIFICATE_OCR: ${ENABLE_VISION_CERTIFICATE_OCR:-false}
    ports:
      - "127.0.0.1:${AI_PORT:-8000}:8000"

  cverify-core:
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_SERVICE_URL: http://cverify-ai:8000
      PORT: 5000
    ports:
      - "127.0.0.1:${CORE_PORT:-5247}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cverify-ai:
        condition: service_healthy

  cverify-client:
    build:
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:${CORE_PORT:-5247}/api
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-your_google_client_id_here}
    env_file:
      - ../.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${CORE_PORT:-5247}/api
      PORT: 3000
      JWT_SECRET: ${JWT_KEY}
    ports:
      - "${CLIENT_PORT:-3000}:3000"
